name: Security Baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  supply-chain:
    name: SBOM, CVE scan & license check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: npm audit (fail on high+)
        run: npm audit --audit-level=high
        continue-on-error: true # report-only until backlog is triaged

      - name: Generate CycloneDX 1.6 SBOM
        # --ignore-npm-errors: `npm ls` can exit non-zero on benign transitive
        # peer-dep warnings; still emit the SBOM.
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --ignore-npm-errors --output-format JSON --spec-version 1.6 --output-file sbom.json
        continue-on-error: true # report-only; never block the merge on SBOM tooling

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json
          if-no-files-found: warn

      - name: License allow-list check
        # GPL-3.0 project: LGPL/GPL deps are compatible; CC-BY-4.0 is data.
        run: >-
          npx --yes license-checker-rseidelsohn@latest
          --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0;LGPL-3.0-or-later;LGPL-3.0;GPL-3.0;CC-BY-4.0"
          --excludePrivatePackages
          --excludePackages "agentic-medical-imaging-helper@1.0.0"
        continue-on-error: true # report-only until dependency licenses are reviewed

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --format=sarif
            --output=osv.sarif
      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true # report-only; never block the merge on scanner infra
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          skip-dirs: node_modules
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
