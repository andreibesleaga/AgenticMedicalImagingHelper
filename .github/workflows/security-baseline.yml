name: Security Baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  supply-chain:
    name: SBOM, CVE scan & license check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: npm audit (fail on high+)
        run: npm audit --audit-level=high
        continue-on-error: true # report-only until backlog is triaged

      - name: Generate CycloneDX 1.6 SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-format JSON --spec-version 1.6 --output-file sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json

      - name: License allow-list check
        run: >-
          npx --yes license-checker-rseidelsohn@latest
          --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0"
          --excludePrivatePackages
        continue-on-error: true # report-only until dependency licenses are reviewed

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.2.2
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --format=sarif
            --output=osv.sarif
      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b960b396a2f37a0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
